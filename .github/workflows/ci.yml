name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.lock
          pip install -r backend/requirements-dev.txt
      - name: Run tests with coverage
        run: cd backend && python -m pytest -v --cov=. --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false   # Coverage upload failure does not fail the build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Install project dependencies
        run: pip install -r backend/requirements.lock
      - name: Run bandit (SAST)
        # -ll = medium+ severity, -ii = medium+ confidence; exit 1 on findings
        run: bandit -r backend/ -ll -ii --exclude backend/tests
      - name: Run pip-audit (dependency CVEs)
        # CVE-2026-4539: affects pygments <=2.19.2; no patched release yet.
        # Remove --ignore-vuln once a fix is available and requirements.lock is regenerated.
        run: pip-audit -r backend/requirements.lock --ignore-vuln CVE-2026-4539

  frontend:
    name: Flutter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: stable
      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend
      - name: Run tests
        run: flutter test --coverage
        working-directory: frontend
      - name: Upload coverage report
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
