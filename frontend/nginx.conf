server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend container
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;

        # Required for HTTP/1.1 keep-alive and SSE
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Disable buffering — CRITICAL for SSE streaming responses
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flutter SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed Flutter build assets
    location ~* \.(js|css|wasm|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
